{% extends "base.html" %}
{% block content %}

<div class="edit-article-container">
    <h1 class="page-title">📝 Create New Article</h1>

    <form method="post" class="edit-article-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit Article</button>
    </form>

    <a href="{% url 'article_list' %}"
    class="btn btn-outline">← Back to Articles</a>
</div>

{% endblock %}
