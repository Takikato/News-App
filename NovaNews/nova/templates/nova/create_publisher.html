{% extends "base.html" %}
{% block content %}

<div class="form-container">
    <h1 class="page-title">🏢 Create Publisher</h1>

    <form method="post" class="publisher-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
        class="btn btn-primary">Create Publisher</button>
    </form>

    <a href="{% url 'publisher_list' %}"
    class="btn btn-outline">← Back to Publishers</a>
</div>

{% endblock %}
