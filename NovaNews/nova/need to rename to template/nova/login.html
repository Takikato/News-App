{% extends "base.html" %}
{% block content %}

<div class="form-container">
    <h2 class="page-title">Login</h2>

    <form method="POST" class="login-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}"
    class="btn btn-outline">Register Account</a>
</div>

{% endblock content %}
