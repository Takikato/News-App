{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>
            {% block title %}
            NovaNews
            {% endblock title %}
        </title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width,
         initial-scale=1">
        <link rel="stylesheet" href="{% static 'nova/styles.css' %}">
    </head>
    <body>
      <header style="position: fixed; top: 10px; right: 20px; z-index: 1000;">
        {% if user.is_authenticated %}
          <form action="{% url 'logout' %}" method="post"
          style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
          </form>
        {% endif %}
      </header>
      <div class="streak"></div>
      <div class="streak"></div>
      <div class="streak"></div>
      <!-- Messages block -->
      {% if messages %}
        <div id="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
      <main>
        {% block content %}
        {% endblock content %}
      </main>
      <footer style="background-color:#222; color:#eee; padding:20px;
       text-align:center; margin-top:40px;">
          <div style="max-width:1200px; margin:auto;">
              <!-- Company Info -->
              <p>&copy; 2026 NovaNews. All rights reserved.</p>
          </div>
      </footer>
      <script>
        setTimeout(function() {
          const messages = document.querySelectorAll('.message');
          messages.forEach(function(msg) {
            msg.style.transition = "opacity 1s ease";
            msg.style.opacity = "0";
            setTimeout(() => msg.remove(), 1000);
          });
        }, 3000);
      </script>
  </body>
</html>
